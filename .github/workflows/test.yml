name: test

on:
  push:
    branches: [main]
  pull_request:

# Cancel any older in-progress run on the same ref when a new push lands.
# Implement-pipeline iterates with 1-3 pushes per iter; without this each
# push spawns a parallel run that stays alive until it finishes naturally,
# burning runner minutes on superseded SHAs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN. This workflow only reads the repo — no
# comments, no releases, no packages. Fork PR runs get this same scope.
permissions:
  contents: read

jobs:
  shell:
    # GitHub-hosted Ubuntu. Was self-hosted on a production Hetzner box —
    # the runner had access to secrets on that host, and `pull_request`
    # events execute arbitrary code from fork PRs (every test file under
    # tests/test_*.sh is fork-editable), which is the textbook RCE-on-
    # runner class. GitHub-hosted removes that class entirely.
    #
    # jq + git are pre-installed on ubuntu-latest images; shellcheck is
    # installed explicitly below (Ubuntu ships it, apt is fast).
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # pinned by SHA per supply-chain hygiene; Dependabot will open bump PRs

      - name: Install test-only deps (jq is preinstalled)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: Bash syntax check
        run: |
          for f in templates/scripts/*.sh tests/run.sh tests/lib/*.sh tests/test_*.sh; do
            [ -f "$f" ] || continue
            bash -n "$f"
          done

      - name: shellcheck pipeline scripts
        # Severity bumped to `warning` — info/style notes (SC2001 sed→parameter
        # expansion, SC2015 A&&B||C, SC2016 jq variables in single quotes) are
        # mostly false positives for our patterns. Real correctness issues
        # (warning/error) still fail the build.
        #
        # SC1091 (sourced files not followed) — sources are resolved at
        # runtime via $(dirname "$0"), shellcheck can't see them statically.
        # SC2034 (unused vars) — bureau-config.sh defines BUREAU_* that
        # downstream scripts consume via word-of-mouth.
        # SC2155 (declare-and-assign) — common pattern in bureau-config.
        # SC2086 (unquoted expansion) — intentional for $CLAUDE word-split.
        run: |
          shellcheck -S warning -e SC1091,SC2034,SC2155,SC2086 \
            templates/scripts/bureau-config.sh \
            templates/scripts/implement-pipeline.sh \
            templates/scripts/qa-pipeline.sh \
            templates/scripts/code-review-pipeline.sh

      - name: Run test harness
        run: bash tests/run.sh
